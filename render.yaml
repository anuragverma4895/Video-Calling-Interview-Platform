services:
  - type: web
    name: video-calling-interview-platform
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_URL
        scope: all
      - key: CLIENT_URL
        scope: all
      - key: ADMIN_EMAILS
        scope: all
      - key: ADMIN_CLERK_IDS
        scope: all
      - key: PISTON_API_URL
        scope: all
      - key: VITE_PISTON_API_URL
        scope: all
      - key: INNGEST_EVENT_KEY
        scope: all
      - key: INNGEST_SIGNING_KEY
        scope: all
      - key: STREAM_API_KEY
        scope: all
      - key: STREAM_API_SECRET
        scope: all
